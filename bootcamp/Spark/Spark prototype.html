<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spark — Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="prototype.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script src="proto-data.jsx"></script>
<script type="text/babel" src="proto-ui.jsx"></script>
<script type="text/babel" src="proto-onboarding.jsx"></script>
<script type="text/babel" src="proto-home.jsx"></script>
<script type="text/babel" src="proto-results.jsx"></script>
<script type="text/babel" src="proto-admin.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

function App() {
  const [state, setState] = useState(() => window.SparkData.loadState());
  const [route, setRoute] = useState(() => state.onboarded ? "home" : "onboarding");
  const [loadingHandle, setLoadingHandle] = useState(null);
  const [resultsHandle, setResultsHandle] = useState(null);
  const [toasts, setToasts] = useState([]);

  const update = (patch) => {
    setState(prev => {
      const next = { ...prev, ...patch };
      window.SparkData.saveState(next);
      return next;
    });
  };

  const store = { ...state, update };

  const pushToast = (t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(prev => [...prev, { ...t, id }]);
  };
  const dismissToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

  const startLookup = (handle) => {
    setLoadingHandle(handle);
    setRoute("loading");
  };

  const finishLookup = () => {
    const handle = loadingHandle;
    if (!handle) return;
    // Add to history (dedupe most-recent)
    const newHistory = [{ handle, when: new Date().toISOString() }, ...state.history.filter(h => h.handle !== handle)].slice(0, 50);
    update({ history: newHistory, lastLookup: { handle, ts: new Date().toISOString() } });
    setResultsHandle(handle);
    setLoadingHandle(null);
    setRoute("results");
  };

  const goHome = () => setRoute("home");
  const goHistory = () => setRoute("history");
  const goProfile = () => setRoute("profile");
  const goAdmin = () => setRoute("admin");
  const openLookup = (handle) => {
    setResultsHandle(handle);
    update({ lastLookup: { handle, ts: new Date().toISOString() } });
    // Bump history
    const newHistory = [{ handle, when: new Date().toISOString() }, ...state.history.filter(h => h.handle !== handle)].slice(0, 50);
    update({ history: newHistory, lastLookup: { handle, ts: new Date().toISOString() } });
    setRoute("results");
  };

  const rerunOnboarding = () => {
    update({ onboarded: false });
    setRoute("onboarding");
  };
  const signOut = () => {
    if (confirm("Sign out and clear your local Spark data?")) {
      localStorage.removeItem(window.SparkData.STORAGE_KEY);
      const fresh = window.SparkData.initialState();
      setState(fresh);
      setRoute("onboarding");
    }
  };

  const showShell = route !== "onboarding";

  return (
    <div className="app">
      {showShell && (
        <header className="topbar">
          <div className="topbar-inner">
            <window.UI.BrandLink onClick={goHome} />
            <span className="spacer" />
            <window.UI.AvatarMenu
              user={state.user}
              onProfile={goProfile}
              onRerunOnboarding={rerunOnboarding}
              onAdmin={goAdmin}
              onSignOut={signOut}
            />
          </div>
        </header>
      )}

      {route === "onboarding" && (
        <Onboarding store={store} onDone={() => setRoute("home")} />
      )}
      {route === "home" && (
        <Home
          store={store}
          onLookup={startLookup}
          onOpenHistory={goHistory}
          onOpenLookup={openLookup}
          toast={pushToast}
        />
      )}
      {route === "loading" && (
        <LoadingScreen handle={loadingHandle} onDone={finishLookup} />
      )}
      {route === "results" && (
        <Results
          store={store}
          handle={resultsHandle}
          onBackHome={goHome}
          pushToast={pushToast}
        />
      )}
      {route === "history" && (
        <HistoryPage store={store} onOpenLookup={openLookup} onBackHome={goHome} />
      )}
      {route === "profile" && (
        <ProfilePage store={store} />
      )}
      {route === "admin" && (
        <window.AdminPage onClose={goHome} />
      )}

      <div className="toast-rail">
        {toasts.map(t => (
          <window.UI.Toast key={t.id}
            text={t.text}
            actionLabel={t.actionLabel}
            onAction={() => { t.onAction && t.onAction(); dismissToast(t.id); }}
            onDismiss={() => dismissToast(t.id)}
            ttl={t.ttl ?? 6000}
          />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
